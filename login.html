<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPRCAS Login</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .login-container{
        background:white;
        padding:40px;
        border-radius:15px;
        width:350px;
        box-shadow:0 5px 20px rgba(0,0,0,0.2);
        text-align:center;
    }

    .logo{
        width:120px;
        margin-bottom:15px;
    }

    h2{
        color:#1e3c72;
        margin-bottom:20px;
    }

    .input-box{
        width:100%;
        margin-bottom:15px;
    }

    .input-box input{
        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:15px;
    }

    .login-btn{
        width:100%;
        padding:12px;
        border:none;
        border-radius:8px;
        background:#1e3c72;
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
    }

    .login-btn:hover{
        background:#2a5298;
    }

    .footer{
        margin-top:15px;
        font-size:13px;
        color:#666;
    }
</style>
</head>
<body>

<div class="login-container">

    <img src="logo.png" alt="KPRCAS Logo" class="logo">

    <h2>KPRCAS Login</h2>

    <form>
        <div class="input-box">
            <input type="text" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="footer">
        Learn Beyond
    </div>

</div>

</body>
</html>
