<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f4f4;
        }

        .search-container {
            text-align: center;
        }

        input[type="text"] {
            width: 350px;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            padding: 12px 20px;
            margin-left: 8px;
            border: none;
            border-radius: 6px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="search-container">
    <h2>Search</h2>

    <form action="https://formsubmit.co/your-email@example.com" method="POST">
        <input
            type="text"
            name="search_query"
            placeholder="Search anything..."
            required
        >

        <button type="submit">Search</button>

        <!-- Optional FormSubmit settings -->
        <input type="hidden" name="_subject" value="New Search Query">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">
    </form>
</div>

</body>
</html>
